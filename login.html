<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Login Form</title>
</head>
<body>
    <div class="container">
        <form id="loginForm" class="login-form">
            <h2>Login</h2>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="loginUser" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="loginPass" name="password" required>
                <button type="button" onclick="togglePassword()">Show</button>
            </div>
            <div class="remember-me">
                <input type="checkbox" id="remember-me" name="remember-me">
                <label for="remember-me">Remember Me</label>
            </div>
            <button type="submit" class="btn">Login</button>
            <div class="register-link">
               <p>Don't have an account? 
                <a href="#" onclick="showRegister()">Register</a>
              </p>
            </div>
        </form>

     <!-- Register Form -->

        <form id="registerForm" class="register-form" style="display: none;">
            <!-- Register Form -->
            <h2>Register</h2>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="regUser" placeholder="Username" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="regPass" placeholder="Password" required>
            </div>
            <button onclick="register()">Register</button>
            <p>Already have an account? 
                <a href="#" onclick="showLogin()">Login</a>
            </p>

        </form>
    </div> 
    <script src="login.js"></script>
</body>
</html>
